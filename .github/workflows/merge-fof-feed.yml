name: Merge FOF Product Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'

permissions:
  contents: write

concurrency:
  group: merge-fof-feed
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run feed merge script
        run: node merge-fof-feeds.js

      - name: Upload merged feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: fof-alle-skoler-feed
          path: fof-alle-skoler-feed.xml

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add fof-alle-skoler-feed.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update merged FOF feed"
          git push
